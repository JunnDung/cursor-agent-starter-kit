name: AI Agent Scaffold
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.cursor/rules/**'
      - '.cursor/skills/**'
      - 'agents/**'
      - 'workflows/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'

jobs:
  validate:
    name: Validate agent workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Check workspace
        run: npm run check

      - name: Validate skills
        run: npm run validate

  lint-context:
    name: Lint AI context files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint AI context files
        uses: MrDwarf7/ai-context-linter@v1.0.0
        with:
          files: "**/{AGENTS.md,CLAUDE.md}"
          max-tokens: "3000"
          fail-on-warnings: "false"

  audit-baseline:
    name: Audit AGENTS.md baseline compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CC audit
        uses: sisyphusse1-ops/cc-audit@v1
        with:
          fail-on-warning: "false"

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    needs: [validate, lint-context, audit-baseline]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "Validation failed"
            exit 1
          fi
          echo "All quality gates passed"

  suggest-aar:
    name: Suggest After-Action Review
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Post AAR reminder
        run: |
          echo "## After-Action Review Reminder" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "After merging, remember to:" >> $GITHUB_STEP_SUMMARY
          echo "1. Run \`npm run generate:skill\` to create new skills" >> $GITHUB_STEP_SUMMARY
          echo "2. Run \`npm run generate:agent\` to create new agents" >> $GITHUB_STEP_SUMMARY
          echo "3. Use \`.cursor/skills/aar/SKILL.md\` for session reflection" >> $GITHUB_STEP_SUMMARY
          echo "4. Update \`memory/decisions.md\` with any new architecture decisions" >> $GITHUB_STEP_SUMMARY
